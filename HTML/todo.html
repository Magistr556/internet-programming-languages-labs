<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TODO List</title>
    <link rel="stylesheet" href="../static/css/todo-style.css">
</head>
<body>
    <header>
        <h1>TODO List</h1>
    </header>
    <main>
        <section class="todo-section">
            <input type="text" id="taskName" placeholder="ЗАDAЧА">
            <textarea type="text" id="taskDescription" placeholder="ОПИШИ"></textarea>
            <button id="addTask">DОBАVИТЬ</button>
            <ul id="todo"></ul>
        </section>
    </main>
    <script src="../static/js/todo.js"></script>
</body>
</html>
