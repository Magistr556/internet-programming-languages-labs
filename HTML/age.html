<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PRO-VERKA VОЗRАSТА</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
<header>
    <div class="header-left">
        <a href="index.html">БЕЖАТЬ</a>
    </div>
    <h1>ПRO-VERKA VОЗRАSТА</h1>
</header>
<main>
<section class="age-check">
    <form id="ageForm">
        <label for="age">VОЗRАSТ:</label>
        <div class="number-input">
            <button class="plus" onclick="this.parentNode.querySelector('input[type=number]').stepUp()" type="button">+</button>
            <input type="number" id="ageinput" max="100" name="age" required>
            <button class="minus" onclick="this.parentNode.querySelector('input[type=number]').stepDown()" type="button">-</button>
        </div>
        <button type="submit">ПRЕDЬЯVИТЬ</button>
    </form>
    <p id="result"></p>

</section>
</main>
<script src="../static/js/age.js"></script>
<script src="../static/js/noise-style.js"></script>
</body>
</html>
